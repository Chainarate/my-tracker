# GitHub Actions equivalent of the Harness pipeline (zero-cost stack).
# Single repo secret required: GROQ_API_KEY.
#
# CSV persistence: after each successful run we commit data/chelsea_tracker.csv
# back to main, so the next run starts with the full historical CSV and the
# pipeline's fingerprint dedup actually accumulates a real database.

name: Chelsea Transfer Tracker

on:
  schedule:
    - cron: "0 */6 * * *"     # every 6 hours
  workflow_dispatch: {}        # manual trigger

permissions:
  contents: write              # required to commit chelsea_tracker.csv back

# Prevent two cron runs from racing on the CSV / git push.
concurrency:
  group: chelsea-tracker-main
  cancel-in-progress: false

jobs:
  build-and-run:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Need a normal token + full history so we can push the CSV back.
          fetch-depth: 0
          persist-credentials: true

      - name: Seed data dir from repo
        run: |
          mkdir -p ./data
          # If a previous run committed the CSV, copy it into ./data so the
          # container's dedup step skips items we already analyzed.
          if [[ -f data/chelsea_tracker.csv ]]; then
            echo "Existing CSV: $(wc -l < data/chelsea_tracker.csv) lines"
          else
            echo "No prior CSV - this run starts fresh."
          fi
          # Container runs as non-root 'app' user; make ./data world-writable
          # so the bind mount works regardless of host vs container UID/GID.
          chmod -R 777 ./data

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          tags: chelsea-transfer-tracker:ci
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run scraper container
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          docker run --rm \
            -e GROQ_API_KEY \
            -e GROQ_MODEL=llama-3.1-8b-instant \
            -e REDDIT_RSS_URL=https://old.reddit.com/r/chelseafc/new/.rss \
            -e STORAGE_BACKEND=local \
            -e OUTPUT_DIR=/data \
            -v "$PWD/data:/data" \
            chelsea-transfer-tracker:ci

      - name: Commit updated CSV back to main
        run: |
          if [[ ! -f data/chelsea_tracker.csv ]]; then
            echo "No CSV produced - nothing to commit."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/chelsea_tracker.csv
          if git diff --cached --quiet; then
            echo "CSV unchanged - skipping commit."
            exit 0
          fi
          rows=$(($(wc -l < data/chelsea_tracker.csv) - 1))
          git commit -m "chore(data): scheduled scraper update — ${rows} total rows" \
                     -m "Auto-generated by .github/workflows/scraper.yml"
          # Pull-rebase in case another commit landed since checkout, then push.
          git pull --rebase origin main
          git push origin HEAD:main

      - name: Upload CSV as workflow artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: chelsea_tracker_csv
          path: ./data/chelsea_tracker.csv
          retention-days: 30
